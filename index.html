<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <h1>Snake</h1>
            <p class="subtitle">Classic grid movement, food, score, and restart.</p>
          </div>
          <div class="stats">
            <span>Score: <strong id="score">0</strong></span>
            <span>Status: <strong id="status">Ready</strong></span>
          </div>
        </div>

        <div class="actions">
          <button id="start-button" type="button">Start</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="board-wrap">
          <div id="board" class="board" role="grid" aria-label="Snake game board"></div>
        </div>

        <div class="controls" aria-label="On-screen controls">
          <button data-direction="up" type="button">Up</button>
          <div class="controls__row">
            <button data-direction="left" type="button">Left</button>
            <button data-direction="down" type="button">Down</button>
            <button data-direction="right" type="button">Right</button>
          </div>
        </div>

        <p class="hint">
          Use arrow keys or WASD. Press Space or P to pause. Press Enter to restart after game over.
        </p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
